services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env.production
    restart: unless-stopped
    ports:
      - "${SURFACE_API_BIND:-127.0.0.1:8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
